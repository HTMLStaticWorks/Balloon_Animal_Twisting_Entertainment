<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@800&amp;display=swap');
    </style>
  </defs>

  <!-- Balloon body -->
  <ellipse cx="34" cy="34" rx="22" ry="26" fill="#FF3366"/>

  <!-- Balloon highlight -->
  <ellipse cx="27" cy="24" rx="6" ry="8" fill="#FF6691" opacity="0.5"/>

  <!-- Balloon knot -->
  <path d="M34 60 C32 63 36 63 34 66" stroke="#FF3366" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Balloon string -->
  <path d="M34 66 C30 72 38 76 34 84" stroke="#FF3366" stroke-width="1.8" stroke-linecap="round" fill="none"/>

  <!-- Second smaller balloon (overlapping, slightly behind) -->
  <ellipse cx="56" cy="38" rx="16" ry="19" fill="#FF3366" opacity="0.35"/>
  <ellipse cx="50" cy="30" rx="4" ry="6" fill="#FF6691" opacity="0.3"/>
  <path d="M56 57 C54 60 58 60 56 63" stroke="#FF3366" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.5"/>

  <!-- Third tiny balloon top-right of cluster -->
  <ellipse cx="50" cy="20" rx="11" ry="13" fill="#FF3366" opacity="0.55"/>
  <ellipse cx="46" cy="14" rx="3" ry="5" fill="#FF6691" opacity="0.3"/>

  <!-- Wordmark: TwistCraft -->
  <text
    x="80"
    y="52"
    font-family="'Playfair Display', Georgia, serif"
    font-weight="800"
    font-size="38"
    fill="#FF3366"
    letter-spacing="-0.5"
  >TwistCraft</text>

  <!-- Accent underline swish -->
  <path d="M80 60 Q195 68 298 58" stroke="#FF3366" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.4"/>
</svg>
