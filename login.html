<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — TwistCraft</title>
    
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
    
    <!-- Styles -->
    <link rel="stylesheet" href="assets/css/style.css">
    
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--color-bg);
            padding: var(--s-24);
            margin: 0;
            overflow: hidden;
        }
        .auth-card {
            width: 100%;
            max-width: 450px;
            background: var(--color-surface);
            padding: var(--s-48);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            text-align: center;
        }
        .logo { margin-bottom: var(--s-32); justify-content: center; }
        
        .form-group { margin-bottom: var(--s-24); text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 700; font-size: 0.9rem; }
        .form-group input { width: 100%; padding: 14px 20px; border-radius: var(--radius); border: 1px solid var(--color-border); background: var(--color-bg); color: var(--color-text); }
        
        .divider { display: flex; align-items: center; margin: var(--s-32) 0; color: var(--color-text-muted); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--color-border); }
        .divider::before { margin-right: 15px; }
        .divider::after { margin-left: 15px; }

        .social-btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 12px; border-radius: var(--radius); border: 1px solid var(--color-border); background: var(--color-bg); cursor: pointer; font-weight: 600; margin-bottom: 10px; transition: var(--transition); }
        .social-btn:hover { background: var(--color-surface); }
        .google-icon { color: #DB4437; }
    </style>
</head>
<body data-theme="light">

    <div class="auth-card">
        <a href="index.html" class="logo">
            <span class="logo-icon"></span>
            TwistCraft
        </a>
        
        <h2 style="margin-bottom: var(--s-32);">Welcome Back</h2>
        
        <form>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="email@example.com" required>
            </div>
            <div class="form-group">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                    <label style="margin-bottom: 0;">Password</label>
                    <a href="#" style="font-size: 0.8rem; color: var(--color-primary);">Forgot Password?</a>
                </div>
                <div style="position: relative;">
                    <input type="password" id="password" placeholder="••••••••" required>
                    <button type="button" id="toggle-password" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--color-text-muted); cursor: pointer;">
                        <i class="ph ph-eye"></i>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
        </form>

        <div class="divider">or continue with</div>

        <button class="social-btn"><i class="ph ph-google-logo google-icon"></i> Google</button>
        <button class="social-btn"><i class="ph ph-envelope"></i> Email</button>

        <p style="margin-top: var(--s-32); font-size: 0.9rem;">Don't have an account? <a href="register.html" style="color: var(--color-primary); font-weight: 700;">Register</a></p>
    </div>

    <script>
        const passToggle = document.getElementById('toggle-password');
        const passInput = document.getElementById('password');
        passToggle.addEventListener('click', () => {
            const type = passInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passInput.setAttribute('type', type);
            passToggle.querySelector('i').classList.toggle('ph-eye');
            passToggle.querySelector('i').classList.toggle('ph-eye-slash');
        });
    </script>
</body>
</html>
